<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現在日期與時間</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        #datetime {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 2px;
        }
        #date {
            font-size: 24px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>現在時間</h1>
        <div id="datetime"></div>
        <div id="date"></div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            const time = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const date = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            document.getElementById('datetime').textContent = time;
            document.getElementById('date').textContent = date;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
